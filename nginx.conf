server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Long-cache fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: let react-router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entrypoint (so new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
